<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ARIA Sphere</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    html.compact, html.compact body {
      background: #161618;
    }
    html.transparent, html.transparent body {
      background: transparent;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="sphere"></canvas>
  <script>
    const canvas = document.getElementById("sphere");
    const COMPACT = new URLSearchParams(location.search).get("compact") === "1";
    const TRANSPARENT = new URLSearchParams(location.search).get("transparent") === "1";
    if (COMPACT) document.documentElement.classList.add("compact");
    if (TRANSPARENT) document.documentElement.classList.add("transparent");

    const stateRef = { listening: false, thinking: false, speaking: false, muted: false, standby: false };
    const audioRef = { bands: null, ts: 0 };
    const CAM_Z = COMPACT ? 17.5 : 22;
    const BASE_R = 7;
    const FOV = COMPACT ? 52 : 55;
    const SIZE_SCALE = COMPACT ? 1.05 : 1.0;
    const CLEAR_RGB = TRANSPARENT ? [0, 0, 0] : (COMPACT ? [22 / 255, 22 / 255, 24 / 255] : [0, 0, 0]);
    const CLEAR_ALPHA = TRANSPARENT ? 0 : 1;

    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = window.innerWidth;
      const h = window.innerHeight;
      canvas.width = Math.max(1, Math.floor(w * dpr));
      canvas.height = Math.max(1, Math.floor(h * dpr));
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    window.setState = function (s) {
      const u = String(s || "").toUpperCase();
      stateRef.listening = u === "LISTENING";
      stateRef.thinking = u === "THINKING" || u === "PROCESSING" || u === "INITIALISING";
      stateRef.speaking = u === "SPEAKING";
      stateRef.standby = u === "STANDBY";
    };

    window.setSpeaking = function (v) {
      stateRef.speaking = !!v;
      if (v) stateRef.listening = false;
    };

    window.setMuted = function (v) {
      stateRef.muted = !!v;
      if (v) {
        stateRef.listening = false;
        stateRef.speaking = false;
        audioRef.bands = null;
      }
    };

    window.setAudioLevels = function (bands) {
      if (!bands || !bands.length) return;
      audioRef.bands = bands;
      audioRef.ts = performance.now();
    };

    const gl = canvas.getContext("webgl", { alpha: true, premultipliedAlpha: false })
      || canvas.getContext("experimental-webgl", { alpha: true, premultipliedAlpha: false });
    if (!gl) {
      document.body.style.color = "#666";
      document.body.style.fontFamily = "monospace";
      document.body.innerHTML = "<p style='padding:1em'>WebGL unavailable</p>";
    } else {
      const VS = `
        attribute vec3 aPos;
        attribute float aFreq;
        attribute float aNoise;
        attribute float aBaseSize;
        uniform mat4 uProj, uView, uModel;
        uniform float uTime, uEnergy;
        uniform sampler2D uFreqTex;
        varying float vGlow;
        void main() {
          float fv = texture2D(uFreqTex, vec2(aFreq, 0.5)).r;
          float breathe = sin(uTime * 0.7 + aNoise * 6.28) * 0.09;
          float noise   = sin(uTime * 1.1 + aNoise * 12.56) * 0.12 * fv;
          float r       = length(aPos);
          float push    = fv * 2.8 + noise + breathe + uEnergy * 0.85;
          vec3 newPos   = normalize(aPos) * (r + push);
          vec4 mv       = uView * uModel * vec4(newPos, 1.0);
          gl_Position   = uProj * mv;
          float ds      = 200.0 / -mv.z;
          gl_PointSize  = aBaseSize * ds * (1.0 + fv * 0.4 + uEnergy * 0.35) * ${SIZE_SCALE.toFixed(2)};
          vGlow = fv * 0.72 + uEnergy * 0.58 + 0.32;
        }
      `;
      const FS = `
        precision mediump float;
        varying float vGlow;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv);
          if (d > 0.5) discard;
          float core = 1.0 - smoothstep(0.0, 0.12, d);
          float rim  = 1.0 - smoothstep(0.12, 0.28, d);
          float a    = clamp((core + rim * 0.28) * (vGlow + 0.42), 0.0, 1.0);
          gl_FragColor = vec4(1.0, 1.0, 1.0, a);
        }
      `;

      function compile(src, type) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
      }
      const prog = gl.createProgram();
      gl.attachShader(prog, compile(VS, gl.VERTEX_SHADER));
      gl.attachShader(prog, compile(FS, gl.FRAGMENT_SHADER));
      gl.linkProgram(prog);
      gl.useProgram(prog);

      const COUNT = COMPACT ? 2800 : 2400;
      const posArr = new Float32Array(COUNT * 3);
      const freqArr = new Float32Array(COUNT);
      const noiseArr = new Float32Array(COUNT);
      const sizeArr = new Float32Array(COUNT);

      for (let i = 0; i < COUNT; i++) {
        const phi = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        posArr[i * 3]     = BASE_R * Math.sin(phi) * Math.cos(theta);
        posArr[i * 3 + 1] = BASE_R * Math.cos(phi);
        posArr[i * 3 + 2] = BASE_R * Math.sin(phi) * Math.sin(theta);
        freqArr[i]  = Math.random();
        noiseArr[i] = Math.random();
        sizeArr[i]  = 0.8 + Math.random() * 0.6;
      }

      function buf(data, name, n) {
        const b = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, b);
        gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
        const loc = gl.getAttribLocation(prog, name);
        gl.enableVertexAttribArray(loc);
        gl.vertexAttribPointer(loc, n, gl.FLOAT, false, 0, 0);
      }
      buf(posArr, "aPos", 3);
      buf(freqArr, "aFreq", 1);
      buf(noiseArr, "aNoise", 1);
      buf(sizeArr, "aBaseSize", 1);

      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

      function uploadFreq(arr) {
        const px = new Uint8Array(64 * 4);
        for (let i = 0; i < 64; i++) {
          const v = Math.round(Math.min(1, arr[i]) * 255);
          px[i * 4] = px[i * 4 + 1] = px[i * 4 + 2] = v;
          px[i * 4 + 3] = 255;
        }
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 64, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, px);
      }

      const uProj   = gl.getUniformLocation(prog, "uProj");
      const uView   = gl.getUniformLocation(prog, "uView");
      const uModel  = gl.getUniformLocation(prog, "uModel");
      const uTime   = gl.getUniformLocation(prog, "uTime");
      const uEnergy = gl.getUniformLocation(prog, "uEnergy");
      gl.uniform1i(gl.getUniformLocation(prog, "uFreqTex"), 0);

      const norm  = v => { const l = Math.hypot(...v); return v.map(x => x / l); };
      const sub   = (a, b) => a.map((x, i) => x - b[i]);
      const cross = (a, b) => [a[1] * b[2] - a[2] * b[1], a[2] * b[0] - a[0] * b[2], a[0] * b[1] - a[1] * b[0]];
      const dot   = (a, b) => a.reduce((s, x, i) => s + x * b[i], 0);

      function perspective(fov, asp, n, f) {
        const t = 1 / Math.tan(fov / 2);
        return new Float32Array([t / asp, 0, 0, 0, 0, t, 0, 0, 0, 0, (f + n) / (n - f), -1, 0, 0, (2 * f * n) / (n - f), 0]);
      }
      function lookAt(eye, ctr, up) {
        const z = norm(sub(eye, ctr)), x = norm(cross(up, z)), y = cross(z, x);
        return new Float32Array([
          x[0], y[0], z[0], 0, x[1], y[1], z[1], 0, x[2], y[2], z[2], 0,
          -dot(x, eye), -dot(y, eye), -dot(z, eye), 1
        ]);
      }
      function mul4(a, b) {
        const r = new Float32Array(16);
        for (let i = 0; i < 4; i++)
          for (let j = 0; j < 4; j++)
            for (let k = 0; k < 4; k++)
              r[i * 4 + j] += a[i * 4 + k] * b[k * 4 + j];
        return r;
      }
      function rotY(a) {
        const c = Math.cos(a), s = Math.sin(a);
        return new Float32Array([c, 0, s, 0, 0, 1, 0, 0, -s, 0, c, 0, 0, 0, 0, 1]);
      }
      function rotX(a) {
        const c = Math.cos(a), s = Math.sin(a);
        return new Float32Array([1, 0, 0, 0, 0, c, -s, 0, 0, s, c, 0, 0, 0, 0, 1]);
      }

      function idleData(t) {
        const arr = new Float32Array(64);
        for (let i = 0; i < 64; i++)
          arr[i] = 0.03 + 0.015 * Math.sin(t * 0.4 + i * 0.08);
        return arr;
      }

      function thinkingData(t) {
        const arr = new Float32Array(64);
        for (let i = 0; i < 64; i++)
          arr[i] = 0.06 + 0.04 * Math.sin(t * 0.6 + i * 0.2);
        return arr;
      }

      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
      gl.disable(gl.DEPTH_TEST);
      gl.clearColor(CLEAR_RGB[0], CLEAR_RGB[1], CLEAR_RGB[2], CLEAR_ALPHA);

      let rotAngle = 0, tiltAngle = 0, smoothEnergy = 0;
      let displayBands = new Float32Array(64);

      function frame(ts) {
        requestAnimationFrame(frame);
        const t = ts / 1000;
        const { listening, thinking, speaking, muted, standby } = stateRef;

        const hasLiveAudio = audioRef.bands
          && (performance.now() - audioRef.ts < 250);

        if (hasLiveAudio && !muted && !standby) {
          const gain = speaking ? 1.0 : 0.85;
          for (let i = 0; i < 64; i++) {
            const target = Math.min(1, audioRef.bands[i] * gain);
            displayBands[i] += (target - displayBands[i]) * 0.48;
          }
        } else if (muted || standby) {
          for (let i = 0; i < 64; i++)
            displayBands[i] *= 0.9;
        } else if (thinking) {
          const idle = thinkingData(t);
          for (let i = 0; i < 64; i++)
            displayBands[i] += (idle[i] - displayBands[i]) * 0.08;
        } else {
          const idle = idleData(t);
          for (let i = 0; i < 64; i++)
            displayBands[i] += (idle[i] - displayBands[i]) * 0.06;
        }

        const raw = displayBands.reduce((a, b) => a + b, 0) / 64;
        smoothEnergy += (raw - smoothEnergy) * 0.1;

        uploadFreq(displayBands);

        const spinSpeed = (muted || standby) ? 0.0008
          : thinking ? 0.0012
          : hasLiveAudio ? 0.002 + smoothEnergy * 0.007
          : 0.001;
        rotAngle  += spinSpeed;
        tiltAngle += muted ? 0.0002 : 0.0005;

        const W = canvas.width, H = canvas.height;
        gl.viewport(0, 0, W, H);
        gl.clear(gl.COLOR_BUFFER_BIT);

        gl.uniformMatrix4fv(uProj,  false, perspective(FOV * Math.PI / 180, W / H, 0.1, 200));
        gl.uniformMatrix4fv(uView,  false, lookAt([0, 0, CAM_Z], [0, 0, 0], [0, 1, 0]));
        gl.uniformMatrix4fv(uModel, false, mul4(rotY(rotAngle), rotX(tiltAngle)));
        gl.uniform1f(uTime, t);
        gl.uniform1f(uEnergy, smoothEnergy);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.drawArrays(gl.POINTS, 0, COUNT);
      }

      requestAnimationFrame(frame);
    }
  </script>
</body>
</html>
